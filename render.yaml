services:
  - type: web
    name: mfx-indicator-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ALLOWED_ORIGINS
        value: http://127.0.0.1:5173,http://localhost:5173
